<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nguyễn Hồng Sơn</title>
  <link rel="icon" href="assets/avatar/avatar.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="overlay">
    <h2>Click to Enter</h2>
  </div>

  <audio id="background-music" loop>
    <source src="assets/music/attack-on-titan.mp3" type="audio/mpeg">
  </audio>

  <div class="background"></div>

  <div class="info-box">
    <div class="avatar-banner"></div>

    <div class="avatar-row">
      <img src="assets/avatar/avatar.gif" alt="Avatar" class="avatar">
      <div class="status-bubble">
        <span>💤 đang chán...</span>
      </div>
    </div>

    <div class="content">
      <h1>Nguyễn Hồng Sơn</h1>

      <div class="bio">
        <p>Tôi là Nguyễn Hồng Sơn.</p>
        <p>Từng là Youtuber có 1 kênh nhỏ "Đã Bán".</p>
        <p>Có tạo vài máy chủ Minecraft nhỏ.</p>
      </div>

      <div class="stats-row">
        <div class="clock-box">
          <p class="stat-label">🕒 Múi giờ hiện tại</p>
          <p id="clock">--:--:--</p>
          <p id="date"></p>
        </div>
        <div class="age-box" title="Sinh ngày 19/09/2009">
          <p class="stat-label">🎂 Tuổi của tôi</p>
          <p id="age-counter">Đang tính...</p>
        </div>
      </div>

      <div class="social-links">
        <a href="https://www.facebook.com/hong.son.611817/" target="_blank">
          <img src="https://cdn.simpleicons.org/facebook/ffffff" alt="Facebook">
        </a>
        <a href="https://github.com/hongson209" target="_blank">
          <img src="https://cdn.simpleicons.org/github/ffffff" alt="GitHub">
        </a>
        <a href="https://discord.gg/z7JYBRZyVk" target="_blank">
          <img src="https://cdn.simpleicons.org/discord/ffffff" alt="Discord">
        </a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
